databases:
  - name: startup-factory-db
    plan: free
    databaseName: startup_factory
    user: startup_factory_user

services:
  - type: web
    name: startup-website-factory
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: startup-factory-db
          property: connectionString
      - key: APP_URL
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_FROM_EMAIL
        sync: false
      - key: MAILGUN_TO_EMAIL
        sync: false
      - key: UNIQUENESS_NAME_THRESHOLD
        value: "0.7"
      - key: UNIQUENESS_COPY_THRESHOLD
        value: "0.6"
      - key: PAGEGRID_API_KEY
        sync: false
